<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>猜数字PK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            background-image: url("background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 10px;
        }

        /* 标题 */
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #000;
            margin-bottom: 10px;
        }

        /* 右侧区域 */
        .right-box {
            text-align: right;
            margin: 8px 0;
        }

        .right-box label {
            color: #ff69b4;
            font-size: 14px;
            margin-right: 5px;
        }

        input, select, button {
            padding: 6px 8px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: transparent;
            margin: 3px;
        }

        button {
            background: #ff69b4;
            color: #fff;
            border: none;
        }

        /* 左侧房主区域 */
        .left-box {
            margin: 10px 0;
        }

        .owner-info {
            color: #000;
            font-size: 14px;
            margin-bottom: 5px;
        }

        /* 猜数区域 */
        .guess-box {
            text-align: right;
            margin: 10px 0;
        }

        .current-player {
            color: #0000ff;
            font-size: 14px;
            text-align: right;
            margin-bottom: 5px;
        }

        .tip {
            color: #ff0000;
            font-size: 14px;
            text-align: right;
            margin-top: 5px;
        }

        /* 战绩记录 */
        .record-box {
            margin: 15px 0;
        }

        .record-title {
            color: #ff0000;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #logArea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 5px;
            font-size: 13px;
            color: #000;
        }

        /* 最高纪录 */
        .rank-box {
            margin: 10px 0;
            font-size: 14px;
        }

        /* 烟花 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            display: none;
        }
    </style>
</head>

<body>

<!-- 1. 标题 -->
<div class="title">猜数字PK</div>

<!-- 8. 左侧房主功能 -->
<div class="left-box">
    <div class="owner-info" id="ownerArea">👑 房主：无</div>
    <button onclick="createRoom()">创建房间</button>
    <button onclick="lockRoom()">锁定房间</button>
    <button onclick="kickPlayer()">踢人</button>
</div>

<!-- 5. 昵称 + 创建房间 -->
<div class="right-box">
    <label>昵称：</label>
    <input type="text" id="nickName" placeholder="请输入昵称">
</div>

<!-- 6. 数字范围 7. 猜几个数 -->
<div class="right-box">
    <label>数字范围：</label>
    <select id="rangeSel">
        <option value="100">1~100</option>
        <option value="200">1~200</option>
        <option value="300">1~300</option>
    </select>

    <label>猜数个数：</label>
    <select id="countSel">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
    </select>
</div>

<!-- 9. 猜数输入框 -->
<div class="guess-box">
    <div class="current-player" id="currentPlayer">当前猜数：无</div>
    <input type="number" id="guessInput" placeholder="输入数字">
    <button onclick="sendGuess()">确认猜数</button>
    <div class="tip" id="tipArea"></div>
</div>

<!-- 11. 战绩记录 -->
<div class="record-box">
    <div class="record-title">战绩</div>
    <div id="logArea"></div>
</div>

<!-- 14. 最高纪录 -->
<div class="rank-box">
    <div id="rankArea">最高纪录：无</div>
</div>

<!-- 烟花 -->
<div id="fireworks"></div>

<script>
// =============================================
// 配置：改成你自己的外网穿透地址（ngrok）
// =============================================
const WS_SERVER = "ws://127.0.0.1:8888";
let ws;
let nick = "";
let room = "";
let isOwner = false;

// 连接服务器
function connect() {
    ws = new WebSocket(WS_SERVER);
    ws.onopen = () => {
        send({type: "join", room: room, name: nick});
    };
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "tip") document.getElementById("tipArea").innerText = data.msg;
        if (data.type === "log") addLog(data.msg);
        if (data.type === "owner") {
            document.getElementById("ownerArea").innerText = "👑 房主：" + data.name;
            isOwner = data.isOwner;
        }
        if (data.type === "current") document.getElementById("currentPlayer").innerText = "当前猜数：" + data.name;
        if (data.type === "win") {
            document.getElementById("tipArea").innerText = "🎉 恭喜 " + data.winner + " 猜对！惩罚：" + data.punish;
            showFireworks();
        }
    };
}

// 创建房间
function createRoom() {
    nick = document.getElementById("nickName").value.trim();
    if (!nick) return alert("请输入昵称");
    room = "ROOM-" + Date.now();
    connect();
    send({type: "create", room: room, name: nick});
}

// 发送消息
function send(d) {
    ws.send(JSON.stringify(d));
}

// 猜数
function sendGuess() {
    const num = document.getElementById("guessInput").value;
    send({type: "guess", name: nick, num: parseInt(num)});
    document.getElementById("guessInput").value = "";
}

// 房主功能
function lockRoom() {
    if (isOwner) send({type: "lock"});
}
function kickPlayer() {
    if (isOwner) {
        const t = prompt("输入要踢的昵称");
        if (t) send({type: "kick", target: t});
    }
}

// 日志
function addLog(msg) {
    const log = document.getElementById("logArea");
    log.innerText = msg + "\n" + log.innerText;
}

// 烟花
function showFireworks() {
    document.getElementById("fireworks").style.display = "block";
    setTimeout(() => {
        document.getElementById("fireworks").style.display = "none";
    }, 3000);
}
</script>

</body>
</html>
